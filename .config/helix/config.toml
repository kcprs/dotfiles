theme = "monokai_pro"

[editor]
true-color = true
line-number = "relative"
idle-timeout = 100
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"

[editor.file-picker]
git-global = false

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name"]
right = ["diagnostics", "selections", "primary-selection-length", "position", "position-percentage", "file-encoding"]

[keys.normal]
"space" = { t = ":format" }
0 = "goto_line_start"
"$" = "goto_line_end"
"^" = "goto_first_nonwhitespace"
G = "goto_file_end"

[keys.select]
0 = "goto_line_start"
"$" = "goto_line_end"
"^" = "goto_first_nonwhitespace"
G = "goto_file_end"

[keys.insert]
j = { k = "normal_mode" }
